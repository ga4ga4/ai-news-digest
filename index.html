<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Digest - Archive</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2129;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', Helvetica, Arial, sans-serif;
            line-height: 1.7;
            padding: 2rem 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 2rem 0 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-blue), #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p { color: var(--text-muted); margin-top: 0.5rem; }
        .digest-list { list-style: none; }
        .digest-list li {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.6rem;
            transition: background 0.2s, border-color 0.2s;
        }
        .digest-list li:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }
        .digest-list a {
            display: block;
            padding: 1rem 1.3rem;
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 1rem;
        }
        .digest-list a:hover { text-decoration: underline; }
        .digest-list .date-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-right: 0.8rem;
        }
        footer {
            text-align: center;
            padding: 2rem 0 1rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI News Digest</h1>
            <p>AI技術 最新ニュースダイジェスト アーカイブ</p>
        </header>
        <ul class="digest-list" id="digest-list"></ul>
        <footer>
            <p>AI News Digest — Powered by Claude</p>
        </footer>
    </div>
    <script>
        const digests = [
            { date: "2026-03-08", file: "ai-news-digest-2026-03-08.html", title: "AI News Digest - 2026年3月8日" }
        ];
        const list = document.getElementById('digest-list');
        digests.forEach(d => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${d.file}"><span class="date-label">${d.date}</span>${d.title}</a>`;
            list.appendChild(li);
        });
    </script>
</body>
</html>
